services:
  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    platform: linux/arm64
    container_name: cds-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-construction_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cds-network
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-construction_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # MinIO (S3-compatible local storage)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    platform: linux/arm64
    container_name: cds-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    networks:
      - cds-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # Backend (NestJS) — ใช้กับ --profile full
  # สร้างหลัง Dockerfile พร้อม (Phase 10)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cds-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-construction_db}
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${BACKEND_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - cds-network
    restart: unless-stopped
    profiles:
      - full

  # ─────────────────────────────────────────
  # Frontend (Next.js) — ใช้กับ --profile full
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3004}
    container_name: cds-frontend
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3004}
    depends_on:
      - backend
    networks:
      - cds-network
    restart: unless-stopped
    profiles:
      - full

  # ─────────────────────────────────────────
  # Nginx reverse proxy — ใช้กับ --profile full
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: cds-nginx
    ports:
      - '${NGINX_PORT:-80}:80'
      - '${NGINX_SSL_PORT:-443}:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - cds-network
    restart: unless-stopped
    profiles:
      - full

  # ─────────────────────────────────────────
  # Backup (PostgreSQL daily dump)
  # รัน: docker compose --profile backup run --rm backup
  # ─────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: cds-backup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./backups:/backups
    command: >
      sh -c "pg_dump -h postgres -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-construction_db} -Fc
      -f /backups/db_$$(date +%Y%m%d_%H%M%S).dump
      && echo 'Backup done'
      && find /backups -name '*.dump' -mtime +30 -delete
      && echo 'Old backups cleaned'"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cds-network
    profiles:
      - backup

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
    name: cds-postgres-data
  minio_data:
    name: cds-minio-data
  letsencrypt:
    name: cds-letsencrypt

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  cds-network:
    name: cds-network
    driver: bridge
